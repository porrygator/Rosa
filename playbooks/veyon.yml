---
- name: Install Veyon from ROSA repositories
  hosts: working_hosts
  become: yes

  tasks:
    - name: Clean dnf metadata
      # Иногда база dnf "тупит", лучше её обновить перед массовой установкой
      shell: dnf clean all

    - name: Install Veyon using dnf
      # Используем shell, потому что модуль dnf на ROSA конфликтует с urpmi
      shell: dnf install -y veyon
      register: veyon_install
      changed_when: "'Installing' in veyon_install.stdout or 'Установка' in veyon_install.stdout"

    - name: Start and enable Veyon service
      systemd:
        name: veyon
        state: started
        enabled: yes
      # Игнорируем, если GUI еще не настроен и сервис не хочет стартовать сразу
      ignore_errors: yes

    - name: Check Veyon version
      shell: veyon-cli -v
      register: veyon_ver
      changed_when: false

    - name: Show installed version
      debug:
        msg: "Veyon version installed: {{ veyon_ver.stdout }}"
